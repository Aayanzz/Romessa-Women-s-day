<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Romessa 💖 Women's Day</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Pacifico&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Patrick Hand', cursive;
  background: linear-gradient(135deg,#FFD1DC,#FFE0F0,#FFF0F5);
  overflow-x: hidden;
  position: relative;
}

/* Loader */
#loader {
  position: fixed; width:100%; height:100%;
  background: #FFEDF7;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  z-index:9999;
  transition: opacity 1s ease;
}
#loader h1 {
  font-family: 'Pacifico', cursive;
  font-size: 3rem; color: #FF4D6D; text-align:center;
}

/* Page */
.page {
  display:none; opacity:0; transition: opacity 1.5s ease;
  max-width:900px; margin:50px auto; padding:40px 20px;
  background: rgba(255,255,255,0.85); border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  text-align:center;
  position: relative;
}
.page.active { display:block; opacity:1; }

/* Heading sparkle */
h1 {
  font-family: 'Pacifico', cursive;
  color:#FF4D6D;
  font-size:3rem;
  position:relative;
}
h1::after {
  content: '✨';
  position:absolute;
  top:-20px;
  right:-30px;
  animation: sparkle 1.5s infinite alternate;
}
@keyframes sparkle { 0%{opacity:0;} 50%{opacity:1;} 100%{opacity:0;} }

/* Button */
.btn {
  font-family: 'Pacifico', cursive;
  background-color:#FF85B3; color:white; border:none;
  padding:15px 30px; border-radius:50px;
  font-size:1.3rem; cursor:pointer;
  transition: transform 0.2s, background 0.3s;
  margin-top:20px;
}
.btn:hover { transform:scale(1.1); background-color:#FF4D6D; }
.heart { color:#FF4D6D; font-size:2rem; animation: heartbeat 1s infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.3);} }

/* Letter Section */
#letter {
  display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:20px;
  margin-top:30px;
  opacity:0;
  transition: opacity 1.5s ease;
}
#letter.show { opacity:1; }

#letter .side {
  display:flex; flex-direction:column; gap:15px;
}
#letter .polaroid {
  width:150px; padding:10px; background:#fff; border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2); transition: transform 0.5s, box-shadow 0.3s;
  opacity:0;
  transform: translateX(-50px) rotate(0deg);
}
#letter .polaroid.right { transform: translateX(50px) rotate(0deg); }

#letter .polaroid img { width:100%; border-radius:8px; display:block; }
#letter .polaroid:hover { transform: scale(1.1) rotate(5deg); box-shadow:0 15px 25px rgba(255,105,180,0.6); }

#letter .text {
  max-width:400px; font-size:1.3rem; color:#333; line-height:1.8;
  text-align:left; white-space: pre-wrap;
  opacity:0;
  font-family: 'Patrick Hand', cursive;
}

/* Floating Hearts */
.heart-float {
  position:absolute;
  font-size:1.5rem;
  color:#FF4D6D;
  animation: float 5s linear infinite;
  pointer-events:none;
}
@keyframes float {
  0%{transform: translateY(0) rotate(0deg); opacity:1;}
  50%{transform: translateY(-50px) rotate(20deg); opacity:0.7;}
  100%{transform: translateY(-100px) rotate(0deg); opacity:0;}
}

/* Mobile */
@media(max-width:800px){
  #letter { flex-direction:column; align-items:center; }
  #letter .text { max-width:100%; font-size:1.15rem; text-align:center; }
  #letter .polaroid { width:120px; }
}
</style>
</head>
<body>

<!-- Background Music -->
<audio autoplay loop id="bgMusic" muted>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Loader -->
<div id="loader">
  <h1>For Romessa 💖</h1>
  <p>Loading magic...</p>
</div>

<!-- Main Page -->
<div class="page" id="mainPage">
  <h1>Happy Women's Day, Romessa! 💕</h1>
  <p>Click the button below for a little surprise I made just for you!</p>
  <button class="btn" onclick="showLetter()">View Surprise <span class="heart">❤️</span></button>

  <!-- Letter Section -->
  <div id="letter">
    <div class="side">
      <div class="polaroid left" style="transform:rotate(-5deg);"><img src="p1.jpg" alt="Romessa1"></div>
      <div class="polaroid left" style="transform:rotate(3deg);"><img src="p2.jpg" alt="Romessa2"></div>
    </div>

    <div class="text" id="typewriter"></div>

    <div class="side">
      <div class="polaroid right" style="transform:rotate(-2deg);"><img src="p3.jpg" alt="Romessa3"></div>
      <div class="polaroid right" style="transform:rotate(4deg);"><img src="p4.jpg" alt="Romessa4"></div>
    </div>
  </div>
</div>

<script>
// Loader
window.onload = () => {
  setTimeout(()=>{
    document.getElementById('loader').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loader').style.display='none';
      document.getElementById('mainPage').classList.add('active');
    },1000);
  },2000);

  createHearts(10); // Floating hearts
};

// Background music
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.3;
bgMusic.addEventListener('ended', ()=>{ bgMusic.play(); });

// Show Letter and animate
function showLetter(){
  // Unmute and play music on first interaction
  bgMusic.muted = false;
  bgMusic.play();

  const letter = document.getElementById('letter');
  letter.classList.add('show');

  // Animate polaroids
  document.querySelectorAll('#letter .polaroid').forEach((el, i)=>{
    setTimeout(()=>{ 
      el.style.opacity=1; 
      el.style.transform='translateX(0) rotate('+el.style.transform.match(/rotate\(([^)]+)\)/)[1]+')'; 
    }, i*300);
  });

  // Typewriter paragraph
  const textEl = document.getElementById('typewriter');
  const text = `Hi Romessa! 💖

I just wanted to say how amazing you are. You made me believe that female friends can be genuinely kind and trustworthy, and that real friendships exist. You always make me feel important and valued, and I know I can share anything with you without any hesitation because you are my secret keeper. Your presence brings such a positive and comfortable vibe, and even just through your photos, I can see how thoughtful and caring you are. Thank you for being such a supportive, fun, and incredible friend — knowing you exist makes friendship feel truly special and magical! 🌸`;

  typeWriter(textEl, text.split(' '), 0);
}

// Typewriter function (one word at a time)
function typeWriter(element, words, index){
  element.style.opacity=1;
  if(index < words.length){
    element.innerHTML += words[index] + ' ';
    setTimeout(()=>typeWriter(element, words, index+1), 250);
  }
}

// Floating Hearts
function createHearts(num){
  for(let i=0;i<num;i++){
    let heart = document.createElement('div');
    heart.classList.add('heart-float');
    heart.style.left=Math.random()*window.innerWidth+'px';
    heart.style.animationDuration= 4 + Math.random()*3 +'s';
    heart.style.fontSize= 12 + Math.random()*12 +'px';
    heart.innerText='❤️';
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
